<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern History App</title>

    <link rel="stylesheet" href="style.css">

    <!-- ICON -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="container">

        <h1>📱 Modern History App</h1>

        <!-- APPS -->
        <div class="apps">

            <button onclick="openApp('WhatsApp')">
                <i class="fa-brands fa-whatsapp"></i>
                WhatsApp
            </button>

            <button onclick="openApp('TikTok')">
                <i class="fa-brands fa-tiktok"></i>
                TikTok
            </button>

            <button onclick="openApp('Instagram')">
                <i class="fa-brands fa-instagram"></i>
                Instagram
            </button>

            <button onclick="openApp('YouTube')">
                <i class="fa-brands fa-youtube"></i>
                YouTube
            </button>

            <button onclick="openApp('Chrome')">
                <i class="fa-brands fa-chrome"></i>
                Chrome
            </button>

            <button onclick="openApp('Spotify')">
                <i class="fa-brands fa-spotify"></i>
                Spotify
            </button>

            <button onclick="openApp('VS Code')">
                <i class="fa-solid fa-code"></i>
                VS Code
            </button>

            <button onclick="openApp('Dota 2')">
                <i class="fa-solid fa-gamepad"></i>
                Dota 2
            </button>

            <button onclick="openApp('Galeri')">
                <i class="fa-solid fa-image"></i>
                Galeri
            </button>

            <button onclick="openApp('My Best')">
                <i class="fa-solid fa-heart"></i>
                My Best
            </button>

        </div>

        <!-- CONTROL -->
        <div class="controls">

            <button onclick="backApp()">⬅ Back</button>
            <button onclick="forwardApp()">➡ Forward</button>
            <button onclick="closeCurrent()">❌ Close</button>

        </div>

        <!-- STATUS -->
        <div class="status" id="status">
            Pilih aplikasi
        </div>

        <!-- HISTORY -->
        <div class="history">

            <h2>History</h2>

            <ul id="historyList"></ul>

        </div>

        <!-- NODE VISUAL -->
        <div class="visual">

            <h2>Double Linked List Visual</h2>

            <div id="nodes"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
