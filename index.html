<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Linked List History App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="container">

        <h1>📱 DOUBLE LINKED LIST HISTORY APP</h1>

        <!-- APPS -->
        <div class="apps">

            <button onclick="insertBack('WhatsApp')">
                <i class="fa-brands fa-whatsapp"></i>
                WhatsApp
            </button>

            <button onclick="insertBack('TikTok')">
                <i class="fa-brands fa-tiktok"></i>
                TikTok
            </button>

            <button onclick="insertBack('Instagram')">
                <i class="fa-brands fa-instagram"></i>
                Instagram
            </button>

            <button onclick="insertBack('YouTube')">
                <i class="fa-brands fa-youtube"></i>
                YouTube
            </button>

            <button onclick="insertBack('Chrome')">
                <i class="fa-brands fa-chrome"></i>
                Chrome
            </button>

            <button onclick="insertBack('Spotify')">
                <i class="fa-brands fa-spotify"></i>
                Spotify
            </button>

            <button onclick="insertBack('VS Code')">
                <i class="fa-solid fa-code"></i>
                VS Code
            </button>

            <button onclick="insertBack('Dota 2')">
                <i class="fa-solid fa-gamepad"></i>
                Dota 2
            </button>

            <button onclick="insertBack('Galeri')">
                <i class="fa-solid fa-image"></i>
                Galeri
            </button>

            <button onclick="insertBack('My Best')">
                <i class="fa-solid fa-heart"></i>
                My Best
            </button>

        </div>


        <!-- INSERT DEPAN -->
        <div class="insert-box">

            <h2>⬅ Insert Depan</h2>

            <select id="frontApp">
                <option value="">Pilih aplikasi</option>
            </select>

            <button onclick="insertFrontUI()">
                Insert Depan
            </button>

        </div>


        <!-- INSERT TENGAH -->
        <div class="insert-box">

            <h2>🔗 Insert Tengah</h2>

            <select id="middleApp">
                <option value="">Pilih aplikasi</option>
            </select>

            <input type="text"
            id="afterApp"
            placeholder="Sisipkan setelah aplikasi">

            <button onclick="insertMiddleUI()">
                Insert Tengah
            </button>

        </div>


        <!-- CONTROL -->
        <div class="controls">

            <button onclick="backApp()">⬅ Back</button>

            <button onclick="forwardApp()">➡ Forward</button>

            <button onclick="deleteFront()">
                ❌ Hapus Depan
            </button>

            <button onclick="deleteCurrent()">
                🗑 Hapus Current
            </button>

            <button onclick="deleteBack()">
                ❌ Hapus Belakang
            </button>

        </div>


        <!-- STATUS -->
        <div class="status" id="status">
            Pilih aplikasi
        </div>


        <!-- HISTORY -->
        <div class="history">

            <h2>📜 History</h2>

            <ul id="historyList"></ul>

        </div>


        <!-- VISUAL -->
        <div class="visual">

            <h2>🔗 Double Linked List Visual</h2>

            <div id="nodes"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
